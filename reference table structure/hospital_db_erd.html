
<div id="erd" style="padding: 8px 0;"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});

const diagram = `erDiagram
  User ||--o| Hospital : "hospital_profile"
  User ||--o| Doctor : "doctor_profile"
  User ||--o| Patient : "patient_profile"
  Hospital ||--o{ Doctor : "employs"
  Doctor ||--o{ DoctorSchedule : "has"
  Doctor ||--o{ DoctorLeave : "applies for"
  Patient ||--o{ PatientHistory : "has"
  PatientHistory ||--o{ PatientDocument : "has"
  PatientHistory ||--o{ Prescription : "contains"
  Doctor ||--o{ PatientHistory : "records"
  Hospital ||--o{ PatientHistory : "hosts"
  Patient ||--o{ Appointment : "books"
  Doctor ||--o{ Appointment : "assigned"
  Hospital ||--o{ Appointment : "at"
  Appointment ||--o| AppointmentQueue : "has"
  Prescription }o--|| Medicine : "for"
  Medicine ||--o{ MedicineStock : "stocked as"
  Hospital ||--o{ MedicineStock : "stores"

  User {
    int id PK
    string username
    string email
    string user_type
    string phone
    bool is_verified
  }
  Hospital {
    int id PK
    int user_id FK
    string name
    string registration_number
    string hospital_type
    bool is_approved
    float rating
  }
  Doctor {
    int id PK
    int user_id FK
    int hospital_id FK
    string specialization
    string qualification
    int experience_years
    decimal consultation_fee
    float rating
  }
  Patient {
    int id PK
    int user_id FK
    string blood_group
    string allergies
    string chronic_diseases
    float height
    float weight
    float bmi
  }
  Appointment {
    int id PK
    string appointment_id
    int patient_id FK
    int doctor_id FK
    int hospital_id FK
    date appointment_date
    string status
    decimal total_amount
    bool is_paid
  }
  PatientHistory {
    int id PK
    int patient_id FK
    int doctor_id FK
    int hospital_id FK
    string visit_type
    string diagnosis
    string treatment_plan
    string status
  }
  Prescription {
    int id PK
    int patient_history_id FK
    int medicine_id FK
    int doctor_id FK
    string dosage
    string frequency
    bool dispensed
  }
  Medicine {
    int id PK
    string name
    string generic_name
    string category
    string medicine_type
    decimal unit_price
    int stock_quantity
  }
  MedicineStock {
    int id PK
    int medicine_id FK
    int hospital_id FK
    string batch_number
    date expiry_date
    int quantity
  }
  DoctorSchedule {
    int id PK
    int doctor_id FK
    string day_of_week
    time start_time
    time end_time
    bool is_holiday
  }
  DoctorLeave {
    int id PK
    int doctor_id FK
    string leave_type
    date start_date
    date end_date
    bool is_approved
  }
  AppointmentQueue {
    int id PK
    int appointment_id FK
    int doctor_id FK
    int queue_number
    int estimated_wait_time
  }
  PatientDocument {
    int id PK
    int patient_id FK
    int history_id FK
    string document_type
    string title
    file file
  }
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
</script>
